<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Siuu Ball</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <header id="top-bar">
      <div class="stat-pill">
        <span class="stat-label">SCORE</span>
        <span id="score" class="stat-value">0</span>
      </div>

      <div class="stat-pill stat-pill--secondary">
        <span class="stat-label">BEST</span>
        <span id="best-score" class="stat-value">0</span>
      </div>

      <button id="settings-btn" class="icon-btn" aria-label="Cài đặt">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1.04H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1.04Z" />
        </svg>
      </button>
    </header>

    <main id="game-frame">
      <div id="game-container">
        <!-- Canvas Pixi được inject vào đây bởi main.js -->

        <!-- Overlay: Menu màn hình chờ -->
        <div id="overlay-menu" class="overlay">
          <div class="overlay-card">
            <div class="overlay-logo">⚽</div>
            <h1 class="overlay-title">Siuu Ball</h1>
            <p class="overlay-sub">Vẽ đường để nảy bóng<br />đừng để chạm viền!</p>
            <button id="btn-start" class="btn-primary">Bắt đầu</button>
          </div>
        </div>

        <!-- Overlay: Game Over -->
        <div id="overlay-gameover" class="overlay overlay--hidden">
          <div class="overlay-card">
            <p class="overlay-label">ĐIỂM CỦA BẠN</p>
            <div id="go-score" class="overlay-score">0</div>
            <p class="overlay-label">KỶ LỤC</p>
            <div id="go-best" class="overlay-best">0</div>
            <button id="btn-restart" class="btn-primary">Chơi lại</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Giữ lại để HUDSystem không lỗi khi query DOM, nhưng ẩn khỏi giao diện -->
    <span id="time" class="visually-hidden">0</span>
  </div>

  <!-- Điểm khởi đầu của game — trình duyệt sẽ chạy file src/main.js -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
