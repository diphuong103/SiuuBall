<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Siuu Ball</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0d0d12;
        overflow: hidden;
        touch-action: none;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #f2f2f2;
        font-family: sans-serif;
        font-size: 20px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="hud">Điểm: <span id="score">0</span></div>
    <script type="module" src="/src/main.js"></script> 
    <!-- Điểm khởi đầu của game — trình duyệt sẽ chạy file src/main.js -->
  </body>
</html>
